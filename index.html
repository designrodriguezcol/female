<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Model Viewer | Javigraphero</title>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      padding: 0;
      background-color: #808080;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    
    .viewer-container {
      width: 100%;
      max-width: 674px;
      position: relative;
    }
    
    .keyshot-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 674 / 900;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      background: #111111;
    }
    
    .keyshot-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    
    /* === DARK CREDIT BADGE === */
    .credit-badge {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      
      background-color: rgba(15, 15, 17, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #f1f1f1;
      font-size: 13.5px;
      font-weight: 500;
      letter-spacing: 0.2px;
      
      padding: 9px 22px;
      border-radius: 9999px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35),
                  0 2px 6px rgba(0, 0, 0, 0.2);
      
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
      backdrop-filter: blur(12px);
    }
    
    .credit-badge .label {
      color: #d1d1d1;
      font-weight: 400;
    }
    
    /* === INNOVATIVE HOVER ON @javigraphero === */
    .credit-badge a {
      color: #7dd3fc;
      text-decoration: none;
      font-weight: 700;
      position: relative;
      transition: all 0.25s cubic-bezier(0.4, 0.0, 0.2, 1);
      padding-bottom: 1px;
    }
    
    /* Animated underline that draws from center */
    .credit-badge a::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 100%;
      height: 1.5px;
      background: linear-gradient(to right, #67e8f9, #bae6fd, #67e8f9);
      border-radius: 2px;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), 
                  opacity 0.2s ease;
      opacity: 0;
    }
    
    .credit-badge a:hover {
      color: #67e8f9;
      transform: translateY(-1.5px) scale(1.04);
      letter-spacing: 0.6px;
      
      /* Strong neon glow - very eye-catching */
      text-shadow: 
        0 0 6px rgba(103, 232, 249, 0.5),
        0 0 14px rgba(103, 232, 249, 0.35),
        0 0 26px rgba(59, 130, 246, 0.25);
    }
    
    .credit-badge a:hover::after {
      transform: translateX(-50%) scaleX(1);
      opacity: 1;
    }
    
    .credit-badge a:active {
      transform: translateY(0) scale(1);
      transition: all 0.1s ease;
    }
  </style>
</head>
<body>
  <div class="viewer-container">
    <div class="keyshot-wrapper">
      <!-- KeyShotXR Viewer -->
      <iframe src="female.html"
              allowfullscreen
              frameborder="0"
              scrolling="no">
      </iframe>
      
      <!-- Dark Credit Badge with innovative hover -->
      <div class="credit-badge">
        <span class="label">3D Model by</span> 
        <a href="https://javigraphero.com" target="_blank" rel="noopener noreferrer">@javigraphero</a>
      </div>
    </div>
  </div>
</body>
</html>
